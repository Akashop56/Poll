name: Daily Cricket Poll

on:
  schedule:
    - cron: '30 4 * * *' # Roz subah 10 AM IST
  workflow_dispatch:      # Manual chalu karne ke liye
  push:                   # Code save karte hi test karne ke liye
    branches:
      - main
      - master

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Python 3.11 use karna best hai ab
          
      - name: Install Dependencies
        run: |
          pip install google-genai playwright # Naya google-genai package
          playwright install --with-deps chromium
          
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python poll_bot.py
