name: Daily Cricket Poll

on:
  schedule:
    - cron: '30 4 * * *' # Roz subah 10 AM IST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          pip install google-generativeai playwright
          playwright install chromium
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python poll_bot.py
